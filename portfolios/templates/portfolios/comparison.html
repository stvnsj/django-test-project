<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio comparison</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 1200px;
            margin: 2rem auto;
        }

        form {
            margin-bottom: 2rem;
        }

        label {
            margin-right: 1rem;
        }

        .chart-container {
            margin-bottom: 3rem;
        }

        canvas {
            max-height: 420px;
        }
    </style>
</head>

<body>
    <h1>Portfolio comparison</h1>

    <form id="dateRangeForm">
        <label>
            Start date:
            <input id="startDateInput" type="date" value="{{ start_date }}">
        </label>

        <label>
            End date:
            <input id="endDateInput" type="date" value="{{ end_date }}">
        </label>

        <button type="submit">Update charts</button>
    </form>

    <div class="chart-container">
        <h2>Portfolio value over time</h2>
        <canvas id="portfolioValueChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Portfolio 1 weights</h2>
        <canvas id="portfolio1WeightsChart"></canvas>
    </div>

    <div class="chart-container">
        <h2>Portfolio 2 weights</h2>
        <canvas id="portfolio2WeightsChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        const portfolio1Id = "{{ portfolio_1_id }}";
        const portfolio2Id = "{{ portfolio_2_id }}";

        const charts = {};

        function formatMoney(value) {
            return new Intl.NumberFormat("en-US", {
                style: "currency",
                currency: "USD",
                maximumFractionDigits: 0,
            }).format(value);
        }

        function formatWeight(value) {
            return new Intl.NumberFormat("en-US", {
                style: "percent",
                maximumFractionDigits: 0,
            }).format(value);
        }

        async function fetchPortfolioEvolution(portfolioId, startDate, endDate) {
            const url = `/api/portfolios/${portfolioId}/evolution/?fecha_inicio=${startDate}&fecha_fin=${endDate}`;
            const response = await fetch(url);

            if (!response.ok) {
                throw new Error(`API request failed: ${response.status}`);
            }

            return response.json();
        }

        function getLabels(apiData) {
            return apiData.data.map(row => row.date);
        }

        function buildValueDataset(apiData, label) {
            return {
                label: label,
                data: apiData.data.map(row => Number(row.portfolio_value)),
                fill: false,
                tension: 0.1,
                pointRadius: 0,
                pointHoverRadius: 4,
                borderWidth: 2,
            };
        }

        function buildWeightDatasets(apiData) {
            if (apiData.data.length === 0) {
                return [];
            }

            const assetNames = apiData.data[0].assets.map(asset => asset.asset);

            return assetNames.map(assetName => {
                return {
                    label: assetName,
                    data: apiData.data.map(row => {
                        const asset = row.assets.find(item => item.asset === assetName);
                        return asset ? Number(asset.weight) : 0;
                    }),
                    fill: true,
                    tension: 0.1,
                    pointRadius: 0,
                    pointHoverRadius: 4,
                    borderWidth: 1,
                };
            });
        }

        function replaceChart(chartName, canvasId, config) {
            if (charts[chartName]) {
                charts[chartName].destroy();
            }

            charts[chartName] = new Chart(
                document.getElementById(canvasId),
                config
            );
        }

        function renderPortfolioValueChart(portfolio1Data, portfolio2Data) {
            replaceChart("value", "portfolioValueChart", {
                type: "line",
                data: {
                    labels: getLabels(portfolio1Data),
                    datasets: [
                        buildValueDataset(portfolio1Data, "Portfolio 1"),
                        buildValueDataset(portfolio2Data, "Portfolio 2"),
                    ],
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: "index",
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: context => {
                                    return `${context.dataset.label}: ${formatMoney(context.parsed.y)}`;
                                },
                            },
                        },
                    },
                    scales: {
                        y: {
                            title: {
                                display: true,
                                text: "Portfolio value",
                            },
                            ticks: {
                                callback: value => formatMoney(value),
                            },
                        },
                    },
                },
            });
        }

        function renderWeightsChart(chartName, canvasId, apiData) {
            replaceChart(chartName, canvasId, {
                type: "line",
                data: {
                    labels: getLabels(apiData),
                    datasets: buildWeightDatasets(apiData),
                },
                options: {
                    responsive: true,
                    interaction: {
                        mode: "index",
                        intersect: false,
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: context => {
                                    return `${context.dataset.label}: ${formatWeight(context.parsed.y)}`;
                                },
                            },
                        },
                    },
                    scales: {
                        y: {
                            stacked: true,
                            min: 0,
                            max: 1,
                            title: {
                                display: true,
                                text: "Weight",
                            },
                            ticks: {
                                callback: value => formatWeight(value),
                            },
                        },
                    },
                },
            });
        }

        async function loadCharts(startDate, endDate) {
            const [portfolio1Data, portfolio2Data] = await Promise.all([
                fetchPortfolioEvolution(portfolio1Id, startDate, endDate),
                fetchPortfolioEvolution(portfolio2Id, startDate, endDate),
            ]);

            renderPortfolioValueChart(portfolio1Data, portfolio2Data);
            renderWeightsChart("weights1", "portfolio1WeightsChart", portfolio1Data);
            renderWeightsChart("weights2", "portfolio2WeightsChart", portfolio2Data);
        }

        function getSelectedDates() {
            return {
                startDate: document.getElementById("startDateInput").value,
                endDate: document.getElementById("endDateInput").value,
            };
        }

        function showError(error) {
            console.error(error);
            alert(`Error loading charts: ${error.message}`);
        }

        document
            .getElementById("dateRangeForm")
            .addEventListener("submit", event => {
                event.preventDefault();

                const dates = getSelectedDates();

                loadCharts(dates.startDate, dates.endDate).catch(showError);
            });

        const dates = getSelectedDates();

        loadCharts(dates.startDate, dates.endDate).catch(showError);
    </script>
</body>
</html>
